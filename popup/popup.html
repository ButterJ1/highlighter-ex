<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highlighter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --muted:     #555;
      --text:      #e8e8e8;
      --sub:       #888;
      --accent:    #f5d547;
      --danger:    #ff5f5f;
      --radius:    10px;
    }

    body {
      width: 300px;
      min-height: 160px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 0;
      overflow: hidden;
    }

    /* -- Header -- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .logo-mark {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 5px;
      display: grid;
      place-items: center;
    }

    .logo-mark svg { width: 12px; height: 12px; }

    .logo-name {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 8px 3px 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .user-chip:hover { border-color: var(--muted); }

    .user-avatar {
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 8px; font-weight: 600;
      color: #000;
      flex-shrink: 0;
    }

    .user-email {
      font-size: 10px;
      color: var(--sub);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* -- Sign-in view -- */
    #signin-view {
      padding: 32px 20px;
      text-align: center;
    }

    .signin-icon {
      width: 48px; height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: grid; place-items: center;
      margin: 0 auto 16px;
    }

    .signin-icon svg { width: 22px; height: 22px; opacity: 0.6; }

    .signin-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .signin-sub {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* -- Main view -- */
    #main-view { display: none; }

    /* -- Tools row -- */
    .tools {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .tool-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--sub);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .tool-btn:hover { border-color: var(--muted); color: var(--text); }
    .tool-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .tool-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* -- Sessions -- */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 8px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .session-list {
      padding: 0 10px;
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .session-list::-webkit-scrollbar { display: none; }

    .session-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 2px;
    }
    .session-item:hover { background: var(--surface); }
    .session-item.active { background: var(--surface); }

    .session-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .session-item.active .session-dot { background: var(--accent); }

    .session-name {
      flex: 1;
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item.active .session-name { color: var(--text); }

    .session-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* -- New session -- */
    .new-session {
      display: flex;
      gap: 6px;
      padding: 8px 10px 12px;
    }

    .new-session input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.12s;
    }
    .new-session input::placeholder { color: var(--muted); }
    .new-session input:focus { border-color: var(--muted); }

    /* -- Buttons -- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 7px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: #f0ca30; }

    .btn-ghost {
      background: var(--surface);
      color: var(--sub);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-google {
      width: 100%;
      justify-content: center;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-size: 13px;
    }
    .btn-google:hover { border-color: var(--muted); }
    .btn-google svg { width: 16px; height: 16px; }

    /* -- Status -- */
    #status {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      padding: 0 16px 10px;
      min-height: 18px;
    }
    #status.ok  { color: #7ecb7e; }
    #status.err { color: var(--danger); }

    /* -- Divider -- */
    .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 2px; }

    /* -- Animations -- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #main-view, #signin-view { animation: fadeIn 0.18s ease; }
  </style>
</head>
<body>

<!-- Sign-in view -->
<div id="signin-view">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 12 12" fill="none">
          <rect x="1" y="4" width="10" height="2" rx="1" fill="#000"/>
          <rect x="1" y="7.5" width="7" height="2" rx="1" fill="#000"/>
        </svg>
      </div>
      <span class="logo-name">highlighter</span>
    </div>
  </div>
  <div style="padding: 28px 20px 24px;">
    <div class="signin-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <div class="signin-title">Sign in to sync</div>
    <div class="signin-sub">Your highlights follow you<br>across all your devices.</div>
    <button class="btn btn-google" id="btn-signin">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div id="status"></div>
  </div>
</div>

<!-- Main view -->
<div id="main-view">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 12 12" fill="none">
          <rect x="1" y="4" width="10" height="2" rx="1" fill="#000"/>
          <rect x="1" y="7.5" width="7" height="2" rx="1" fill="#000"/>
        </svg>
      </div>
      <span class="logo-name">highlighter</span>
    </div>
    <div class="user-chip" id="btn-signout" title="Sign out">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-email" id="user-name"></span>
    </div>
  </div>

  <div class="tools">
    <button class="tool-btn" id="btn-eraser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 20H7L3 16l11-11 6 6-4.5 4.5"/>
        <path d="M6.5 17.5l4-4"/>
      </svg>
      Eraser
    </button>
    <button class="tool-btn" id="btn-hide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
      Hide
    </button>
  </div>

  <hr class="divider">

  <div class="section-head">
    <span class="section-label">Sessions</span>
  </div>

  <div class="session-list" id="session-list"></div>

  <div class="new-session">
    <input id="new-session-name" type="text" placeholder="New session…" maxlength="40">
    <button class="btn btn-primary" id="btn-new-session">Add</button>
  </div>

  <div id="status"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
